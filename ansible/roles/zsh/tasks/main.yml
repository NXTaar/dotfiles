---
- name: ZSH | Link .zshrc
  ansible.builtin.file:
    src: "{{ ansible_dotfiles_root }}/configs/.zshrc"
    dest: "{{ ansible_env.HOME }}/.zshrc"
    state: link
- name: ZSH | Link Powerlevel10k theme file
  ansible.builtin.file:
    src: "{{ ansible_dotfiles_root }}/configs/.p10k.zsh"
    dest: "{{ ansible_env.HOME }}/.p10k.zsh"
    state: link
- name: ZSH | Ensure config directory
  ansible.builtin.file:
    path: "{{ ansible_env.HOME }}/.config"
    state: directory
